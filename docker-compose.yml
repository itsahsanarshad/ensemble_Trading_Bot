services:
  trading-bot-v2:
    build: .
    container_name: ensemble_trading_bot_v2
    restart: always
    ports:
      - "5001:5001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./models:/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  data:
  logs:
  models:
